short_bio: >-
  <p>
    I am an interdisciplinary researcher interested in enhancing robots' perception and decision-making capabilities through advanced DL/RL algorithms, especially large models-powered methods, 
    while improving the robustness and safety of robots in complex tasks and environments, and exploring broader application scenarios of embodied AI.
    
  # <img src="assets/images/photos/research interest-3.png" alt="Research Interests" 
  #          style="float: left; width: 350px; margin-right: 10px; border-radius: 8px;">
  </p>

  <p>
    I am actively seeking a <strong>Ph.D. position</strong> starting in Fall 2027.
    In Jan 2026, I got a Master of Science in Data Science at the  
    <a href="https://www.ntu.edu.sg/computing" target="_blank">College of Computing and Data Science, Nanyang Technological University</a>.
    Prior to this, I obtained a Bachelor of Engineering in Computer Science & Technology at the
    <a href="https://sstc.neuq.edu.cn/" target="_blank">Sydney Smart Technology College, Northeastern University (China)</a>,
    under the supervision of Prof. <a href="https://liguorui77.github.io/" target="_blank">Guorui Li</a>
  </p>

  <p>
    I am a currently Research Assistant in <a href="https://ids.nus.edu.sg/" target="_blank"> Institute of Data Science </a> at National University of Singapore,
    working with Dr. <a href="https://ryliu68.github.io/" target="_blank">Renyang Liu</a>, 
    under the supervision of Prof. <a href="https://www.comp.nus.edu.sg/~ngsk/" target="_blank">See-Kiong Ng</a>.
    During my master's degree, I worked closely with Dr. <a href="https://kreattang.github.io/" target="_blank">Wenbing Tang</a>, 
    and Prof. <a href="https://huang-yihao.github.io/" target="_blank">Yihao Huang</a>,
    supervised by with Prof. <a href="https://personal.ntu.edu.sg/yangliu/" target="_blank">Yang Liu</a>
    in SPRL Lab at <a href="https://www.ntu.edu.sg/" target="_blank">Nanyang Technological University</a>.
    Previously, I was a Research Assistant at <a href="https://www.hkust-gz.edu.cn/" target="_blank">HKUST(GZ)</a>, 
    working in PEAK Lab with Prof. <a href="https://changhao-chen.github.io/" target="_blank">Changhao Chen</a>. 
    Before that, I worked as a Software Development Engineer Intern at 
    Shanghai Lianshang Network Technology Co,. Ltd. and China Telecom Digital Intelligence Technology Co., Ltd.
  </p>


